<!DOCTYPE html>
<html>
<head>
    <title>California Housing Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px;
            box-sizing: border-box;
        }

        button {
            padding: 12px;
            width: 100%;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>California Housing Price Predictor</h1>

<label>Median Income (MedInc)</label>
<input type="number" id="MedInc" step="any">

<label>House Age</label>
<input type="number" id="HouseAge" step="any">

<label>Average Rooms</label>
<input type="number" id="AveRooms" step="any">

<label>Average Bedrooms</label>
<input type="number" id="AveBedrms" step="any">

<label>Population</label>
<input type="number" id="Population" step="any">

<label>Average Occupancy</label>
<input type="number" id="AveOccup" step="any">

<label>Latitude</label>
<input type="number" id="Latitude" step="any">

<label>Longitude</label>
<input type="number" id="Longitude" step="any">

<button onclick="predictPrice()">Predict</button>

<div id="result"></div>

<script>
async function predictPrice() {

    const data = {
        MedInc: parseFloat(document.getElementById("MedInc").value),
        HouseAge: parseFloat(document.getElementById("HouseAge").value),
        AveRooms: parseFloat(document.getElementById("AveRooms").value),
        AveBedrms: parseFloat(document.getElementById("AveBedrms").value),
        Population: parseFloat(document.getElementById("Population").value),
        AveOccup: parseFloat(document.getElementById("AveOccup").value),
        Latitude: parseFloat(document.getElementById("Latitude").value),
        Longitude: parseFloat(document.getElementById("Longitude").value)
    };

    document.getElementById("result").innerHTML = "Predicting...";

    try {

        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerHTML =
            `
            Predicted House Price: <br>
            <b>${result.prediction}</b><br><br>
            Source: <b>${result.source}</b>
            `;

    } catch (error) {
        document.getElementById("result").innerHTML =
            "Error connecting to API";
    }
}
</script>

</body>
</html>
